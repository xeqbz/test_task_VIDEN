input:
  fb_ads_path: "input/fb_ads_mock.json"

output:
  normalized_jsonl_path: "output/fb_ads_normalized.jsonl"

facebook_ads:
  purchase_action: "purchase"

  flat_fields:
    string_fields:
      - campaign_id
      - campaign_name
      - adset_id
      - adset_name
      - ad_id
      - ad_name
      - date_start
      - date_stop
      - age
      - gender

    int_fields:
      - impressions
      - clicks
      - reach
      - unique_clicks

    decimal_fields:
      - frequency
      - spend
      - cpm
      - cpc
      - ctr
      - cpp

  nested_metrics:
    actions:
      value_type: "int"
      default: 0
      mappings:
        link_click: "link_clicks"
        landing_page_view: "landing_page_views"
        page_engagement: "page_engagements"
        post_engagement: "post_engagements"
        video_view: "video_views"
        view_content: "view_content"
        add_to_cart: "add_to_cart"
        initiate_checkout: "initiate_checkout"
        add_payment_info: "add_payment_info"
        purchase: "purchases"

    action_values:
      value_type: "decimal"
      default: 0
      mappings:
        view_content: "view_content_value"
        add_to_cart: "add_to_cart_value"
        initiate_checkout: "initiate_checkout_value"
        add_payment_info: "add_payment_info_value"
        purchase: "purchase_revenue"

    cost_per_action_type:
      value_type: "decimal"
      default: null
      mappings:
        link_click: "cost_per_link_click"
        landing_page_view: "cost_per_landing_page_view"
        page_engagement: "cost_per_page_engagement"
        post_engagement: "cost_per_post_engagement"
        video_view: "cost_per_video_view"
        view_content: "cost_per_view_content"
        add_to_cart: "cost_per_add_to_cart"
        initiate_checkout: "cost_per_initiate_checkout"
        add_payment_info: "cost_per_add_payment_info"
        purchase: "cost_per_purchase"

    website_ctr:
      value_type: "decimal"
      default: null
      mappings:
        link_click: "website_ctr_link_click"

    video_play_actions:
      value_type: "int"
      default: 0
      mappings:
        video_view: "video_plays"

    video_avg_time_watched_actions:
      value_type: "decimal"
      default: null
      mappings:
        video_view: "video_avg_time_watched_seconds"

bigquery:
  project_id: "your-gcp-project-id"
  dataset_id: "your_dataset_id"
  table_id: "your_table_id"